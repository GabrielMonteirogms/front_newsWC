<div class="min-h-screen bg-black text-white px-6 py-8">

  <div class="flex items-center gap-3 mb-8">
    <span class="text-xs font-semibold uppercase tracking-widest text-green-400 bg-green-400/10 border border-green-400/30 rounded px-2.5 py-1">
      Categoria
    </span>
    <h1 class="text-3xl font-bold tracking-tight">Stadiums</h1>
    <span class="ml-auto text-sm text-white/30">{{ newsList.length }} notícias</span>
  </div>

  <ng-container *ngIf="newsList.length > 0; else loading">
    <div class="flex flex-col gap-px bg-white/5 rounded-2xl overflow-hidden border border-white/[0.06]">

      <div
        *ngFor="let news of newsList"
        [routerLink]="['/news', news.id]"
        class="group relative flex bg-[#111] hover:bg-[#161616] cursor-pointer transition-colors duration-150 overflow-hidden">

        <div class="absolute left-0 top-0 bottom-0 w-[3px] bg-transparent group-hover:bg-green-500 transition-colors duration-150"></div>

        <div class="w-64 min-w-[256px] h-44 overflow-hidden shrink-0">
          <img [src]="news.imageUrl" class="w-full h-full object-cover" [alt]="news.title">
        </div>

        <div class="flex flex-col justify-center gap-2 px-8 py-6 flex-1 min-w-0">
          <span class="text-[11px] font-semibold uppercase tracking-widest text-green-400">Estádio</span>
          <h2 class="text-xl font-semibold text-white/90 leading-snug">{{ news.title }}</h2>
          <p class="text-sm text-white/50 leading-relaxed line-clamp-2">{{ news.summary }}</p>
          <div class="flex items-center gap-2 mt-1">
            <div class="w-1.5 h-1.5 rounded-full bg-green-500"></div>
        
          </div>
        </div>

        <div class="self-center pr-8 text-white/20 text-2xl group-hover:text-green-400 group-hover:translate-x-1 transition-all duration-150">›</div>

      </div>

    </div>
  </ng-container>

  <ng-template #loading>
    <div class="flex items-center gap-3 text-white/30 text-sm py-8">
      <div class="w-4 h-4 border-2 border-white/10 border-t-green-500 rounded-full animate-spin"></div>
      Carregando estádios...
    </div>
  </ng-template>

</div>
