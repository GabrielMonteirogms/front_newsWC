<div
  *ngIf="news"
  class="min-h-screen bg-black text-white">

  <div class="max-w-5xl mx-auto px-4 py-12">

    <img
      [src]="news.imageUrl"
      class="w-full h-[500px] object-cover rounded-3xl mb-8">

    <div
      class="inline-flex items-center gap-2
             bg-green-500/10
             border border-green-500/20
             px-4 py-2 rounded-full
             text-green-300 text-sm mb-6">

      👁️ {{ news.views }} visualizações

    </div>

 <div *ngIf="news">





    <div
      class="prose prose-invert max-w-none
             text-white/90 leading-8">

      {{ news.content }}

    </div>

    <div
      class="mt-16 rounded-3xl overflow-hidden border border-white/10">
<div
  *ngIf="videoUrl"
  class="mt-16 rounded-3xl overflow-hidden border border-white/10">

  <iframe
    width="100%"
    height="500"
    [src]="videoUrl"
    title="Vídeo"
    allowfullscreen>
  </iframe>

</div>

    </div>

  </div>

</div>
